[package]
name = "crowdsource"
version = "0.1.0"
edition = "2024"

[lib]
path = "src/lib/lib.rs"
doctest = false

[[bin]]
name = "crowdsource-server"
path = "src/bin/server/main.rs"
test = false
doctest = false

[dependencies]
anyhow = "1.0.100"
axum = "0.8.8"
email_address = { version = "0.2.9", default-features = false }
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
tokio = { version = "1.49.0", features = ["rt-multi-thread", "macros", "net"] }
tower-http = { version = "0.6.8", features = ["trace"] }
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
uuid = { version = "1.20.0", features = ["v4"] }
